<form id="detail-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-id" class="form-control" type="text" value="{$row.id|htmlentities}" disabled>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" class="form-control" type="text" value="{$row.title|htmlentities}" disabled>
        </div>
    </div>
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Image')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-image" class="form-control" size="50" type="text" value="{$row.image|htmlentities}" disabled>
            </div>
            <ul class="row list-inline faupload-preview" id="p-image"></ul>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Mall_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-mall_price" class="form-control" type="text" value="¥ {$row.mall_price|htmlentities}" disabled>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Merchant_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-merchant_price" class="form-control" type="text" value="¥ {$row.merchant_price|htmlentities}" disabled>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">库存状态:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" type="text" value="{$row.stock_status_text|default=''}" disabled>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">分享状态:</label>
        <div class="col-xs-12 col-sm-8">
            <input class="form-control" type="text" value="{$row.share_status_text|default=''}" disabled>
        </div>
    </div>

</form>
