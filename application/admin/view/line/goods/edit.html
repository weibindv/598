<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Title')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-title" class="form-control" name="row[title]" type="text" value="{$row.title|htmlentities}" readonly>
        </div>
    </div>
    
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Image')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-image" class="form-control" size="50" name="row[image]" type="text" value="{$row.image|htmlentities}" readonly>
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="fachoose-image" class="btn btn-primary fachoose" data-input-id="c-image" data-mimetype="image/*" data-multiple="false" disabled><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
                <span class="msg-box n-right" for="c-image"></span>
            </div>
            <ul class="row list-inline faupload-preview" id="p-image"></ul>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Mall_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-mall_price" class="form-control" step="0.01" name="row[mall_price]" type="number" value="{$row.mall_price|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Merchant_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-merchant_price" class="form-control" step="0.01" name="row[merchant_price]" type="number" value="{$row.merchant_price|htmlentities}">
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">库存状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-stock_status" class="form-control" name="row[stock_status]">
                {foreach name="stockStatusList" item="vo"}
                <option value="{$key}" {if $row.stock_status == $key}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">分享状态:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-share_status" class="form-control" name="row[share_status]">
                {foreach name="shareStatusList" item="vo"}
                <option value="{$key}" {if $row.share_status == $key}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>

    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed">{:__('OK')}</button>
        </div>
    </div>
</form>
