<table class="table table-striped">
    <thead>
        <tr>
            <th>{:__('Field')}</th>
            <th>{:__('Content')}</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>消息ID</td>
            <td>{$row.message_id}</td>
        </tr>
        <tr>
            <td>接收人</td>
            <td>{$row.nickname}</td>
        </tr>
        <tr>
            <td>接收人ID</td>
            <td>{$row.user_id}</td>
        </tr>
        <tr>
            <td>消息类型</td>
            <td>{$msgTypeList[$row.msg_type]}</td>
        </tr>
        <tr>
            <td>推送状态</td>
            <td>{$pushStatusList[$row.push_status]}</td>
        </tr>
        <tr>
            <td>发送时间</td>
            <td>{:date('Y-m-d H:i:s', $row.createtime)}</td>
        </tr>
        <tr>
            <td>关联订单</td>
            <td>{$row.order_no}</td>
        </tr>
        <tr>
            <td>订单ID</td>
            <td>{$row.order_id}</td>
        </tr>
    </tbody>
</table>
<div class="hide layer-footer">
    <label class="control-label col-xs-12 col-sm-2"></label>
    <div class="col-xs-12 col-sm-8">
        <button type="reset" class="btn btn-primary btn-embossed btn-close" onclick="Layer.closeAll();">{:__('Close')}</button>
    </div>
</div>
